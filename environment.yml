name: dgcnn
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core
  - python=3.10
  - pip
  
  # PyTorch (GPU - change cudatoolkit version if needed)
  - pytorch::pytorch::*[build=py310_cuda11.8*]
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::torchaudio
  
  # Scientific
  - numpy>=1.21.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  
  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.12.0
  - pillow>=9.0.0
  
  # Utilities
  - tqdm>=4.62.0
  - pyyaml>=5.4
  
  # Development
  - pytest>=7.0
  - flake8>=4.0
  - black>=22.0
  - mypy>=0.950
  
  # Jupyter (optional)
  - jupyter
  - jupyterlab
  - ipython

# Alternative: CPU-only version
# Change pytorch::pytorch::*[build=py310_cuda11.8*] to:
#   - pytorch::pytorch::*[build=py310_cpu*]
# Remove pytorch::pytorch-cuda line

# Installation:
# conda env create -f environment.yml
# conda activate dgcnn
